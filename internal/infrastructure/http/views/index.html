{{ define "content" }}

<h3>Create Invoice</h3>

<form 
  hx-post="/invoices"
  hx-target="#invoices"
  hx-swap="outerHTML">

  <label>ID:</label>
  <input type="text" name="id" required>

  <label>Amount:</label>
  <input type="number" name="amount" required>

  <button type="submit">Create</button>
</form>

<br><br>

<div 
  id="invoices"
  hx-get="/invoices"
  hx-trigger="load, every 3s"
  hx-swap="outerHTML">
</div>

{{ end }}
